services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-store_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-store_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-store_intelligence}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-store_user} -d ${POSTGRES_DB:-store_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-store_user}:${POSTGRES_PASSWORD:-store_pass}@postgres:5432/${POSTGRES_DB:-store_intelligence}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-store_user}:${POSTGRES_PASSWORD:-store_pass}@postgres:5432/${POSTGRES_DB:-store_intelligence}
      REDIS_URL:         redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    command: >
      streamlit run dashboard/app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true

volumes:
  postgres_data: